<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Center circle -->
  <circle cx="100" cy="100" r="30" fill="#00D4FF" />
  
  <!-- Outer circles connected by lines -->
  <g stroke="#00D4FF" stroke-width="2" fill="none">
    <!-- Top -->
    <line x1="100" y1="100" x2="100" y2="35" />
    <circle cx="100" cy="25" r="8" fill="#00D4FF" />
    
    <!-- Top-right -->
    <line x1="100" y1="100" x2="135" y2="55" />
    <circle cx="145" cy="45" r="8" fill="#FFD700" />
    
    <!-- Right -->
    <line x1="100" y1="100" x2="160" y2="100" />
    <circle cx="170" cy="100" r="8" fill="#00D4FF" />
    
    <!-- Bottom-right -->
    <line x1="100" y1="100" x2="135" y2="145" />
    <circle cx="145" cy="155" r="8" fill="#00D4FF" />
    
    <!-- Bottom -->
    <line x1="100" y1="100" x2="100" y2="165" />
    <circle cx="100" cy="175" r="8" fill="#00D4FF" />
    
    <!-- Bottom-left -->
    <line x1="100" y1="100" x2="65" y2="145" />
    <circle cx="55" cy="155" r="8" fill="#00D4FF" />
    
    <!-- Left -->
    <line x1="100" y1="100" x2="40" y2="100" />
    <circle cx="30" cy="100" r="8" fill="#00D4FF" />
    
    <!-- Top-left -->
    <line x1="100" y1="100" x2="65" y2="55" />
    <circle cx="55" cy="45" r="8" fill="#00D4FF" />
  </g>
</svg>
